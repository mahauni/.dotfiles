# Enable mouse
set -g mouse on

# Enable Truecolors to the tmux
set-option -ga terminal-features 'xterm-256color:RGB'

# Enable OSC 52 clipboard passthrough for tmux-256color
set-option -ga terminal-features 'tmux-256color:clipboard'

set-option -g focus-events on

# Allow apps (e.g. Neovim vim.ui.img / image.nvim) to pass graphics protocol
# escapes through tmux to WezTerm
set -g allow-passthrough on

set -g set-clipboard on

# Start at 1
set -g base-index 1
setw -g pane-base-index 1

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

setw -g mode-keys vi

bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel \; run-shell "tmux save-buffer - | ~/.local/bin/osc52-copy.sh"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'seebi/tmux-colors-solarized'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

# Enable auto ressurect of tmux sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

set -g status-right '%Y-%m-%d %H:%M #{tmux_mode_indicator}'

run '~/.tmux/plugins/tpm/tpm'
